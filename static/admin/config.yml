backend:
  name: github
  repo: mostakimsakib0/saif-ahmed
  branch: main
  base_url: https://saif-ahmed-auth.herokuapp.com
  auth_endpoint: /auth

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "post"
    label: "Posts"
    folder: "content/post"
    create: true
    slug: "{{slug}}"
    i18n:
      structure: suffix
      locales: [en, bn]
      default_locale: en
    fields:
      - { label: "Title (English)", name: "title", widget: "string", i18n: true }
      - { label: "Description", name: "description", widget: "text", required: false, i18n: true }
      - { label: "Publish Date", name: "date", widget: "datetime", i18n: duplicate }
      - { label: "Last Modified", name: "lastmod", widget: "datetime", required: false, i18n: duplicate }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }
      - { label: "Categories", name: "categories", widget: "list", required: false, i18n: duplicate }
      - { label: "Tags", name: "tags", widget: "list", required: false, i18n: duplicate }
      - { label: "Image", name: "image", widget: "image", required: false, i18n: duplicate }

  - name: "pages"
    label: "Pages"
    folder: "content/page"
    create: false
    slug: "{{slug}}"
    i18n:
      structure: suffix
      locales: [en, bn]
      default_locale: en
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Description", name: "description", widget: "text", required: false, i18n: true }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }
